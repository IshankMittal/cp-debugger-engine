<!DOCTYPE html>
<html>
<head>
    <title>Offline CP Debugger</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        textarea { width: 100%; height: 300px; font-family: monospace; }
        button { padding: 10px 20px; margin-top: 10px; }
        pre { background: #f4f4f4; padding: 15px; white-space: pre-wrap; }
    </style>
</head>
<body>

<h2>Offline Competitive Programming Debugger</h2>

<textarea id="code" placeholder="Paste your C++ code here..."></textarea>
<br>
<label>
    <input type="checkbox" id="fix"> Generate corrected code
</label>
<br>
<button onclick="analyze()">Analyze</button>

<h3>Output:</h3>
<pre id="output"></pre>

<script>
async function analyze() {
    const code = document.getElementById("code").value;
    const fix = document.getElementById("fix").checked;

    const response = await fetch("/debug", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code: code, fix: fix })
    });

    const data = await response.json();
    document.getElementById("output").textContent = data.analysis;
}
</script>

</body>
</html>
